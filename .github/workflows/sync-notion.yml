name: Sync Notion to Blog

on:
  schedule:
    # Run daily at 00:00 UTC (08:00 Beijing time)
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Sync Notion content
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          # Optional: auto-discovers all shared pages if not set
          NOTION_PARENT_PAGE_IDS: ${{ secrets.NOTION_PARENT_PAGE_IDS }}
        run: node scripts/sync-notion.mjs

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/ src/notion-categories.json public/notion-assets/ || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "sync: update blog content from Notion

          Automated sync by GitHub Actions

          Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>"
            git pull --rebase origin main
            git push
          fi
